{% extends "base.html" %}
{% block title %}Google Sign-in (Demo){% endblock %}
{% block content %}

<div class="page-head">
  <span class="tag">DEMO</span>
  <h1>Simulated <span class="accent">Google Sign-in</span></h1>
  <p>This screen stands in for Google's account chooser while no OAuth credentials are configured.</p>
</div>

<div class="panel auth-box">
  <h2 style="display:flex;align-items:center;justify-content:center;gap:10px">
    <svg width="26" height="26" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.2 6.1 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="m6.3 14.7 6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.2 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.3 0-9.7-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3a12 12 0 0 1-4.1 5.6l6.2 5.2C36.9 39.2 44 34 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>
    Choose an account
  </h2>
  <div class="auth-sub">to continue to RITS Services</div>
  <form method="post" class="form-grid">
    <div>
      <label for="email">Google email</label>
      <input id="email" name="email" type="email" required placeholder="you@gmail.com">
    </div>
    <div>
      <label for="name">Display name (optional)</label>
      <input id="name" name="name" type="text" placeholder="Your Name">
    </div>
    <button type="submit" class="btn-primary" style="justify-content:center">Continue <span class="arrow-circle">→</span></button>
  </form>
</div>

{% endblock %}
